<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Investment Tracker</title>
  <style>
    body { font-family: sans-serif; background: #121212; color: #fff; margin: 20px; }
    .card { background: #1e1e1e; padding: 15px; margin: 10px 0; border-radius: 8px; cursor: pointer; }
    .card:hover { border: 1px solid #00adb5; }
    button { background: #00adb5; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; margin-top: 5px; }
    input, select { padding: 8px; margin: 5px 0; display: block; width: 250px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #1e1e1e; border-radius: 8px; overflow: hidden; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
    th { background: #222; color: #00adb5; }
    .btn-danger { background: #ff4444; }
    .btn-secondary { background: #555; margin-left: 10px; }
    .flex-container { display: flex; gap: 30px; margin-top: 20px; flex-wrap: wrap; }
    .box { flex: 1; min-width: 300px; background: #1a1a1a; padding: 20px; border-radius: 8px; }
  </style>
</head>
<body>

  <h1>📊 Meu Tracker de Investimentos</h1>
  <hr>
  
  <div id="app"></div>

  <script src="app.js"></script>
</body>
</html>
